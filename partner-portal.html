<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Dashboard — Carely</title>
  <link rel="icon" type="image/png" href="carely-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #028090; --deep-teal: #0D3347; --mint: #02C39A;
      --off-white: #F7FBFA; --grey-100: #F1F5F4; --grey-300: #C8D6D3;
      --grey-500: #7A9490; --text: #0D2B24; --white: #fff;
      --radius: 16px; --danger: #EF4444;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--off-white); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(247,251,250,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(200,214,211,0.5); padding: 0 20px; }
    .nav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem; color: var(--deep-teal); text-decoration: none; }
    main { max-width: 960px; margin: 0 auto; padding: 40px 20px 80px; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 50vh; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--grey-300); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #portal { display: none; }
    .page-title { font-size: 2rem; font-weight: 900; color: var(--deep-teal); margin-bottom: 4px; letter-spacing: -0.03em; }
    .page-subtitle { font-size: 1rem; color: var(--grey-500); margin-bottom: 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--white); border-radius: var(--radius); padding: 20px; border: 1.5px solid var(--grey-300); }
    .stat-value { font-size: 2rem; font-weight: 900; color: var(--deep-teal); }
    .stat-value.highlight { color: var(--mint); }
    .stat-label { font-size: 0.82rem; font-weight: 600; color: var(--grey-500); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .referral-box { background: var(--deep-teal); border-radius: var(--radius); padding: 24px; margin-bottom: 32px; }
    .referral-box h2 { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .referral-url { font-size: 1rem; color: var(--white); font-weight: 600; word-break: break-all; background: rgba(255,255,255,0.1); padding: 12px 16px; border-radius: 10px; margin-bottom: 12px; }
    .copy-btn { background: var(--mint); color: var(--deep-teal); border: none; border-radius: 10px; padding: 10px 20px; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
    .referral-note { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 10px; }
    .table-wrap { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--grey-300); overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--grey-300); }
    .table-title { font-size: 1rem; font-weight: 800; color: var(--deep-teal); }
    .table-count { font-size: 0.85rem; color: var(--grey-500); }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--off-white); padding: 10px 16px; font-size: 0.78rem; font-weight: 700; color: var(--grey-500); text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }
    td { padding: 12px 16px; font-size: 0.875rem; color: var(--text); border-top: 1px solid var(--grey-100); }
    .badge { display: inline-flex; align-items: center; border-radius: 8px; padding: 3px 10px; font-size: 0.78rem; font-weight: 700; }
    .badge-green { background: #D1FAE5; color: #065F46; }
    .badge-grey { background: var(--grey-100); color: var(--grey-500); }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--grey-500); }
    .error-msg { color: var(--danger); font-weight: 700; text-align: center; }
    footer { background: var(--deep-teal); color: rgba(255,255,255,0.6); text-align: center; padding: 24px 20px; font-size: 0.82rem; margin-top: 60px; }
  </style>
  <!-- PostHog Analytics -->
  <script>
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]);t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.crossOrigin="anonymous",p.async=!0,p.src=s.api_host.replace(".i.posthog.com","posthog.com")+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+" (stub)"},o="capture identify alias people.set people.set_once set_config register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys onSessionId".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||(window.posthog=[]));
    posthog.init('phc_REPLACE_WITH_YOUR_KEY',{api_host:'https://us.i.posthog.com',person_profiles:'identified_only'});
    document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('a[href*="carely.fit/#"],a.nav-cta,a.hero-cta,a.cta-btn').forEach(function(el){el.addEventListener('click',function(){posthog.capture('cta_clicked',{text:el.textContent.trim(),href:el.getAttribute('href'),page:location.pathname});});});});
  </script>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo">
      <img src="carely-icon.png" alt="Carely" style="height:32px;width:auto;" />
      Carely Partner
    </a>
    <span id="partner-name-nav" style="font-weight:600;font-size:0.9rem;color:var(--teal);"></span>
  </div>
</nav>

<main>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:var(--grey-500);">Loading your dashboard...</p>
  </div>

  <div id="portal">
    <h1 class="page-title" id="portal-title">Partner Dashboard</h1>
    <p class="page-subtitle">Your referral performance at a glance</p>

    <div class="stats-grid" id="stats-grid"></div>

    <div class="referral-box">
      <h2>Your referral link</h2>
      <div class="referral-url" id="referral-url"></div>
      <button class="copy-btn" id="copy-btn">Copy link</button>
      <p class="referral-note">Share this link with patients. When they subscribe, you earn <span id="commission-pct">20</span>% of their monthly plan.</p>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Referred users</span>
        <span class="table-count" id="referred-count"></span>
      </div>
      <div id="table-container"></div>
    </div>
  </div>
</main>

<footer>
  <span>© 2026 Carely · Partner Program</span>
</footer>

<script>
  var API = 'https://carely-backend-production.up.railway.app';
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');

  function setText(id, value) {
    var el = document.getElementById(id);
    if (el) el.textContent = String(value);
  }

  function makeStatCard(value, label, highlight) {
    var card = document.createElement('div');
    card.className = 'stat-card';
    var v = document.createElement('div');
    v.className = highlight ? 'stat-value highlight' : 'stat-value';
    v.textContent = String(value);
    var l = document.createElement('div');
    l.className = 'stat-label';
    l.textContent = label;
    card.appendChild(v);
    card.appendChild(l);
    return card;
  }

  function buildTable(referrals) {
    var container = document.getElementById('table-container');
    container.textContent = '';

    if (!referrals.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No referrals yet. Share your link to get started.';
      container.appendChild(empty);
      return;
    }

    var table = document.createElement('table');
    var thead = document.createElement('thead');
    var hrow = document.createElement('tr');
    ['User', 'Referred', 'Plan', 'Status'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    referrals.forEach(function(r) {
      var row = document.createElement('tr');

      var emailCell = document.createElement('td');
      emailCell.textContent = r.email;
      var dateCell = document.createElement('td');
      dateCell.textContent = new Date(r.referredAt).toLocaleDateString();
      var planCell = document.createElement('td');
      planCell.textContent = r.plan || '—';
      var statusCell = document.createElement('td');
      var badge = document.createElement('span');
      badge.className = r.converted ? 'badge badge-green' : 'badge badge-grey';
      badge.textContent = r.converted ? 'Paying' : 'Trial';
      statusCell.appendChild(badge);

      row.appendChild(emailCell);
      row.appendChild(dateCell);
      row.appendChild(planCell);
      row.appendChild(statusCell);
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  if (!token) {
    var loading = document.getElementById('loading');
    loading.textContent = '';
    var msg = document.createElement('p');
    msg.className = 'error-msg';
    msg.textContent = 'No access token. Check your partner link.';
    loading.appendChild(msg);
  } else {
    fetch(API + '/affiliate/dashboard?token=' + encodeURIComponent(token))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.partner) throw new Error(data.message || 'Invalid token');

        document.getElementById('loading').style.display = 'none';
        document.getElementById('portal').style.display = 'block';

        var partner = data.partner;
        var stats = data.stats;
        var referrals = data.referrals || [];

        setText('portal-title', partner.name + ' Dashboard');
        setText('partner-name-nav', partner.name);
        setText('referral-url', partner.referralUrl);
        setText('commission-pct', partner.commissionPct);
        setText('referred-count', referrals.length + ' users');

        var grid = document.getElementById('stats-grid');
        grid.textContent = '';
        grid.appendChild(makeStatCard(stats.totalReferrals, 'Total referrals', false));
        grid.appendChild(makeStatCard(stats.payingUsers, 'Paying subscribers', true));
        grid.appendChild(makeStatCard('$' + stats.monthlyRevenueGenerated, 'Monthly revenue generated', false));
        grid.appendChild(makeStatCard('$' + stats.yourMonthlyEarning, 'Your monthly earning', true));

        buildTable(referrals);

        document.getElementById('copy-btn').addEventListener('click', function() {
          navigator.clipboard.writeText(partner.referralUrl).then(function() {
            document.getElementById('copy-btn').textContent = 'Copied!';
            setTimeout(function() { document.getElementById('copy-btn').textContent = 'Copy link'; }, 2000);
          });
        });
      })
      .catch(function(err) {
        var loading = document.getElementById('loading');
        loading.textContent = '';
        var msg = document.createElement('p');
        msg.className = 'error-msg';
        msg.textContent = err.message || 'Could not load dashboard.';
        loading.appendChild(msg);
      });
  }
</script>
</body>
</html>
